<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>n3on — форум</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060B14;
  --bg-alt:#081120;
  --glass:rgba(15,27,46,0.55);
  --glass-strong:rgba(15,27,46,0.82);
  --glass-border:rgba(120,170,255,0.14);
  --neon:#00D4FF;
  --neon-soft:rgba(0,212,255,0.35);
  --violet:#6C5CE7;
  --success:#34E4B0;
  --danger:#FF4D6D;
  --warn:#FFC168;
  --text:#E8F1FF;
  --muted:#8DA2C2;
  --muted-dim:#5C7093;
  --radius-lg:20px;
  --radius-md:14px;
  --radius-sm:9px;
  --shadow-glow:0 0 0 1px var(--glass-border), 0 20px 60px -20px rgba(0,0,0,0.7);
  --font-display:'Space Grotesk', sans-serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'JetBrains Mono', monospace;
}
html[data-theme="light"]{
  --bg:#EEF2FA;
  --bg-alt:#E4E9F5;
  --glass:rgba(255,255,255,0.6);
  --glass-strong:rgba(255,255,255,0.88);
  --glass-border:rgba(40,60,110,0.12);
  --neon:#0090C8;
  --neon-soft:rgba(0,144,200,0.25);
  --violet:#5B4BD6;
  --success:#0FA57A;
  --danger:#E23A5A;
  --warn:#C87A00;
  --text:#101B33;
  --muted:#51628A;
  --muted-dim:#8494B8;
  --shadow-glow:0 0 0 1px var(--glass-border), 0 20px 60px -25px rgba(30,50,90,0.35);
}
*{box-sizing:border-box; margin:0; padding:0;}
::selection{background:var(--neon-soft); color:var(--text);}
::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--glass-border); border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:var(--neon-soft);}
html,body{height:100%;}
body{
  font-family:var(--font-body);
  background:
    radial-gradient(1200px 700px at 15% -10%, rgba(108,92,231,0.16), transparent 60%),
    radial-gradient(1000px 600px at 85% 0%, rgba(0,212,255,0.12), transparent 55%),
    var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  transition:background 0.4s ease, color 0.3s ease;
}
a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer;}
:focus-visible{outline:2px solid var(--neon); outline-offset:2px; border-radius:6px;}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}

.app{display:grid; grid-template-columns:264px 1fr; min-height:100vh;}

/* ---------- SIDEBAR ---------- */
.sidebar{
  position:sticky; top:0; height:100vh;
  background:var(--glass-strong);
  backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
  border-right:1px solid var(--glass-border);
  display:flex; flex-direction:column;
  padding:22px 16px;
  z-index:40;
}
.brand{display:flex; align-items:center; gap:10px; padding:6px 10px 26px;}
.brand-mark{
  width:34px; height:34px; border-radius:10px;
  background:linear-gradient(135deg, var(--neon), var(--violet));
  box-shadow:0 0 22px var(--neon-soft);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:700; color:#04101c; font-size:16px;
}
.brand-name{font-family:var(--font-display); font-weight:700; font-size:19px; letter-spacing:0.5px;}
.brand-name span{color:var(--neon);}

.pulse-bar{
  display:flex; align-items:center; gap:8px;
  padding:9px 12px; margin:0 0 20px;
  border-radius:var(--radius-sm);
  background:linear-gradient(90deg, rgba(0,212,255,0.12), rgba(108,92,231,0.10));
  border:1px solid var(--glass-border);
  font-family:var(--font-mono); font-size:11.5px; color:var(--muted);
  overflow:hidden; position:relative;
}
.pulse-dot{
  width:7px; height:7px; border-radius:50%; background:var(--success);
  box-shadow:0 0 8px var(--success);
  animation:pulseDot 1.8s ease-in-out infinite;
  flex-shrink:0;
}
@keyframes pulseDot{0%,100%{opacity:1; transform:scale(1);} 50%{opacity:0.4; transform:scale(0.8);}}
.pulse-bar b{color:var(--text); font-weight:600;}

.nav-section-label{
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase;
  color:var(--muted-dim); padding:14px 12px 8px;
}
.nav-item{
  display:flex; align-items:center; gap:11px;
  padding:10px 12px; border-radius:var(--radius-sm);
  color:var(--muted); font-size:14px; font-weight:500;
  transition:all 0.18s ease; position:relative; margin-bottom:2px;
  background:transparent; border:none; width:100%; text-align:left;
}
.nav-item svg{width:18px; height:18px; flex-shrink:0; opacity:0.85;}
.nav-item:hover{background:rgba(120,170,255,0.08); color:var(--text);}
.nav-item.active{
  background:linear-gradient(90deg, rgba(0,212,255,0.14), rgba(108,92,231,0.08));
  color:var(--text);
  box-shadow:inset 0 0 0 1px var(--glass-border);
}
.nav-item.active::before{
  content:''; position:absolute; left:-16px; top:50%; transform:translateY(-50%);
  width:3px; height:18px; border-radius:3px;
  background:linear-gradient(180deg, var(--neon), var(--violet));
  box-shadow:0 0 10px var(--neon-soft);
}
.nav-badge{
  margin-left:auto; font-family:var(--font-mono); font-size:10.5px; font-weight:600;
  background:var(--neon-soft); color:var(--neon); padding:2px 7px; border-radius:20px;
}
.sidebar-footer{margin-top:auto; padding-top:14px; border-top:1px solid var(--glass-border);}
.mini-profile{
  display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:var(--radius-sm);
  transition:background 0.18s ease;
}
.mini-profile:hover{background:rgba(120,170,255,0.08);}
.avatar{
  width:36px; height:36px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg, var(--violet), var(--neon));
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:700; font-size:14px; color:#04101c;
  position:relative;
}
.avatar.ring::after{
  content:''; position:absolute; inset:-3px; border-radius:50%;
  border:1.5px solid var(--neon-soft);
}
.avatar-sm{width:28px; height:28px; font-size:11px;}
.avatar-lg{width:76px; height:76px; font-size:26px;}
.mini-profile-name{font-size:13.5px; font-weight:600;}
.mini-profile-role{font-size:11px; color:var(--muted-dim); font-family:var(--font-mono);}

/* ---------- MAIN LAYOUT ---------- */
.main{display:flex; flex-direction:column; min-height:100vh;}
.topbar{
  position:sticky; top:0; z-index:30;
  display:flex; align-items:center; gap:16px;
  padding:16px 30px;
  background:var(--glass);
  backdrop-filter:blur(20px) saturate(150%);
  -webkit-backdrop-filter:blur(20px) saturate(150%);
  border-bottom:1px solid var(--glass-border);
}
.search-wrap{
  flex:1; max-width:520px; position:relative; display:flex; align-items:center;
}
.search-wrap svg{position:absolute; left:14px; width:16px; height:16px; color:var(--muted-dim);}
.search-input{
  width:100%; padding:10px 14px 10px 40px; border-radius:12px;
  background:rgba(120,170,255,0.06); border:1px solid var(--glass-border);
  color:var(--text); font-size:13.5px; transition:all 0.2s ease;
}
.search-input::placeholder{color:var(--muted-dim);}
.search-input:focus{
  border-color:var(--neon-soft); background:rgba(120,170,255,0.1);
  box-shadow:0 0 0 4px rgba(0,212,255,0.08);
}
.topbar-actions{display:flex; align-items:center; gap:10px; margin-left:auto;}
.icon-btn{
  width:38px; height:38px; border-radius:11px; border:1px solid var(--glass-border);
  background:rgba(120,170,255,0.05); color:var(--muted); display:flex; align-items:center; justify-content:center;
  transition:all 0.18s ease; position:relative; flex-shrink:0;
}
.icon-btn:hover{background:rgba(120,170,255,0.12); color:var(--text); border-color:var(--neon-soft);}
.icon-btn svg{width:17px; height:17px;}
.dot-alert{
  position:absolute; top:6px; right:7px; width:7px; height:7px; border-radius:50%;
  background:var(--danger); box-shadow:0 0 6px var(--danger);
}
.btn{
  font-family:var(--font-body); font-weight:600; font-size:13.5px; padding:10px 18px;
  border-radius:11px; border:1px solid transparent; transition:all 0.18s ease;
  display:inline-flex; align-items:center; gap:8px; white-space:nowrap;
}
.btn-primary{
  background:linear-gradient(135deg, var(--neon), var(--violet)); color:#04101c;
  box-shadow:0 8px 24px -8px var(--neon-soft);
}
.btn-primary:hover{transform:translateY(-1px); box-shadow:0 12px 28px -8px var(--neon-soft);}
.btn-primary:active{transform:translateY(0);}
.btn-ghost{background:rgba(120,170,255,0.06); color:var(--text); border-color:var(--glass-border);}
.btn-ghost:hover{background:rgba(120,170,255,0.12); border-color:var(--neon-soft);}
.btn-danger-ghost{background:rgba(255,77,109,0.08); color:var(--danger); border-color:rgba(255,77,109,0.25);}
.btn-danger-ghost:hover{background:rgba(255,77,109,0.16);}
.btn-sm{padding:7px 13px; font-size:12.5px; border-radius:9px;}
.btn:disabled{opacity:0.45; cursor:not-allowed; transform:none !important;}

.content{flex:1; padding:28px 30px 60px; max-width:1180px; width:100%; margin:0 auto;}
.page-head{display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:22px; gap:16px; flex-wrap:wrap;}
.page-title{font-family:var(--font-display); font-size:28px; font-weight:700; letter-spacing:-0.3px;}
.page-sub{color:var(--muted); font-size:13.5px; margin-top:4px;}
.breadcrumb{display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--muted-dim); margin-bottom:10px; font-family:var(--font-mono);}
.breadcrumb a:hover{color:var(--neon);}

/* ---------- CARDS ---------- */
.card{
  background:var(--glass); border:1px solid var(--glass-border); border-radius:var(--radius-lg);
  backdrop-filter:blur(18px) saturate(140%); -webkit-backdrop-filter:blur(18px) saturate(140%);
  box-shadow:var(--shadow-glow); transition:all 0.25s ease; position:relative;
}
.stats-row{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:26px;}
.stat-card{padding:18px 20px;}
.stat-num{font-family:var(--font-display); font-size:26px; font-weight:700; background:linear-gradient(135deg,var(--neon),var(--violet)); -webkit-background-clip:text; background-clip:text; color:transparent;}
.stat-label{font-size:12px; color:var(--muted); margin-top:4px;}

.cat-grid{display:grid; grid-template-columns:repeat(2, 1fr); gap:16px;}
.cat-card{
  padding:22px; cursor:pointer; overflow:hidden;
}
.cat-card:hover{transform:translateY(-3px); border-color:var(--neon-soft); box-shadow:0 24px 50px -20px rgba(0,212,255,0.15), var(--shadow-glow);}
.cat-icon{
  width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center;
  font-size:20px; margin-bottom:14px;
}
.cat-title{font-family:var(--font-display); font-weight:600; font-size:16.5px; margin-bottom:5px;}
.cat-desc{font-size:13px; color:var(--muted); line-height:1.5; margin-bottom:14px;}
.cat-meta{display:flex; align-items:center; gap:14px; font-size:11.5px; color:var(--muted-dim); font-family:var(--font-mono);}
.cat-meta b{color:var(--text); font-weight:600;}

.topic-list{display:flex; flex-direction:column; gap:10px;}
.topic-row{
  display:flex; align-items:center; gap:16px; padding:16px 18px; cursor:pointer;
}
.topic-row:hover{border-color:var(--neon-soft); transform:translateX(2px);}
.topic-main{flex:1; min-width:0;}
.topic-title-line{display:flex; align-items:center; gap:8px; margin-bottom:5px; flex-wrap:wrap;}
.topic-title{font-weight:600; font-size:14.5px;}
.tag{
  font-size:10.5px; font-family:var(--font-mono); padding:2px 8px; border-radius:20px; font-weight:600;
  background:rgba(0,212,255,0.12); color:var(--neon); border:1px solid rgba(0,212,255,0.2);
}
.tag.pinned{background:rgba(255,193,104,0.14); color:var(--warn); border-color:rgba(255,193,104,0.25);}
.tag.hot{background:rgba(255,77,109,0.14); color:var(--danger); border-color:rgba(255,77,109,0.25);}
.topic-meta{font-size:12px; color:var(--muted-dim); display:flex; gap:10px; flex-wrap:wrap;}
.topic-meta b{color:var(--muted); font-weight:500;}
.topic-stats{display:flex; gap:20px; font-family:var(--font-mono); font-size:12.5px; color:var(--muted); flex-shrink:0;}
.topic-stats div{text-align:center;}
.topic-stats span{display:block; font-weight:600; color:var(--text); font-size:14px;}

.filters-bar{display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap;}
.chip{
  padding:8px 14px; border-radius:20px; font-size:12.5px; font-weight:500;
  background:rgba(120,170,255,0.06); border:1px solid var(--glass-border); color:var(--muted);
  transition:all 0.18s ease;
}
.chip:hover{color:var(--text); border-color:var(--neon-soft);}
.chip.active{background:linear-gradient(90deg, rgba(0,212,255,0.18), rgba(108,92,231,0.14)); color:var(--text); border-color:var(--neon-soft);}
.spacer{flex:1;}
.select-mini{
  padding:8px 12px; border-radius:10px; background:rgba(120,170,255,0.06); border:1px solid var(--glass-border);
  color:var(--muted); font-size:12.5px;
}

.pagination{display:flex; align-items:center; justify-content:center; gap:6px; margin-top:26px;}
.page-btn{
  width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center;
  background:rgba(120,170,255,0.05); border:1px solid var(--glass-border); color:var(--muted); font-size:13px; font-family:var(--font-mono);
}
.page-btn:hover{color:var(--text); border-color:var(--neon-soft);}
.page-btn.active{background:linear-gradient(135deg, var(--neon), var(--violet)); color:#04101c; font-weight:700; border-color:transparent;}

/* ---------- SKELETON / EMPTY / ERROR ---------- */
.skeleton{background:linear-gradient(90deg, rgba(120,170,255,0.05), rgba(120,170,255,0.14), rgba(120,170,255,0.05)); background-size:200% 100%; animation:shimmer 1.6s ease-in-out infinite; border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0;} 100%{background-position:-200% 0;}}
.skel-row{padding:16px 18px; display:flex; gap:16px; align-items:center;}
.skel-line{height:12px; border-radius:6px;}

.empty-state, .error-state{display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 30px; text-align:center;}
.empty-icon{width:56px; height:56px; border-radius:16px; display:flex; align-items:center; justify-content:center; background:rgba(120,170,255,0.08); margin-bottom:18px; font-size:24px;}
.error-icon{background:rgba(255,77,109,0.1); color:var(--danger);}
.empty-title{font-family:var(--font-display); font-weight:600; font-size:17px; margin-bottom:6px;}
.empty-text{color:var(--muted); font-size:13.5px; max-width:340px; line-height:1.6; margin-bottom:18px;}

/* ---------- TOPIC PAGE ---------- */
.topic-header{padding:26px 28px; margin-bottom:20px;}
.topic-header h1{font-family:var(--font-display); font-size:23px; font-weight:700; margin-bottom:10px; line-height:1.3;}
.topic-header-meta{display:flex; align-items:center; gap:16px; flex-wrap:wrap; font-size:12.5px; color:var(--muted);}
.post{padding:22px 24px; margin-bottom:14px; display:flex; gap:16px;}
.post-author{width:120px; flex-shrink:0; text-align:center;}
.post-author-name{font-weight:600; font-size:13px; margin-top:8px;}
.post-author-role{font-size:10.5px; font-family:var(--font-mono); color:var(--muted-dim); margin-top:2px;}
.role-badge{
  display:inline-block; margin-top:6px; font-size:9.5px; font-family:var(--font-mono); font-weight:700;
  padding:2px 8px; border-radius:20px; letter-spacing:0.4px;
}
.role-founder{background:linear-gradient(90deg, rgba(0,212,255,0.2), rgba(108,92,231,0.2)); color:var(--neon); border:1px solid var(--neon-soft);}
.role-mod{background:rgba(52,228,176,0.15); color:var(--success); border:1px solid rgba(52,228,176,0.3);}
.role-user{background:rgba(120,170,255,0.08); color:var(--muted); border:1px solid var(--glass-border);}
.post-body{flex:1; min-width:0;}
.post-toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
.post-time{font-size:11.5px; color:var(--muted-dim); font-family:var(--font-mono);}
.post-text{font-size:14px; line-height:1.75; color:var(--text); opacity:0.92;}
.post-text p{margin-bottom:10px;}
.post-actions{display:flex; align-items:center; gap:8px; margin-top:14px;}
.react-btn{
  display:flex; align-items:center; gap:6px; padding:6px 11px; border-radius:20px; font-size:12px;
  background:rgba(120,170,255,0.05); border:1px solid var(--glass-border); color:var(--muted);
}
.react-btn:hover{color:var(--text); border-color:var(--neon-soft);}
.react-btn.liked{color:var(--neon); border-color:var(--neon-soft); background:rgba(0,212,255,0.1);}
.more-btn{width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center; color:var(--muted-dim); background:transparent; border:none;}
.more-btn:hover{background:rgba(120,170,255,0.1); color:var(--text);}

.editor-card{padding:20px 22px; margin-top:22px;}
.editor-toolbar{display:flex; gap:4px; padding-bottom:12px; margin-bottom:14px; border-bottom:1px solid var(--glass-border); flex-wrap:wrap;}
.editor-btn{width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; background:transparent; border:none; color:var(--muted); font-size:13px; font-weight:600;}
.editor-btn:hover{background:rgba(120,170,255,0.1); color:var(--text);}
.editor-area{
  min-height:110px; border-radius:12px; padding:14px; background:rgba(120,170,255,0.04);
  border:1px solid var(--glass-border); color:var(--text); font-size:14px; line-height:1.6; outline:none;
}
.editor-area:empty::before{content:attr(data-placeholder); color:var(--muted-dim);}
.editor-area:focus{border-color:var(--neon-soft); box-shadow:0 0 0 4px rgba(0,212,255,0.06);}
.editor-footer{display:flex; justify-content:flex-end; gap:10px; margin-top:14px;}

/* ---------- FORMS ---------- */
.form-group{margin-bottom:16px;}
.form-label{display:block; font-size:12.5px; font-weight:600; margin-bottom:7px; color:var(--muted);}
.form-input{
  width:100%; padding:11px 14px; border-radius:11px; background:rgba(120,170,255,0.05);
  border:1px solid var(--glass-border); color:var(--text); font-size:13.5px; transition:all 0.18s ease;
}
.form-input:focus{border-color:var(--neon-soft); box-shadow:0 0 0 4px rgba(0,212,255,0.08); background:rgba(120,170,255,0.08);}
.form-hint{font-size:11.5px; color:var(--muted-dim); margin-top:5px;}
.form-error{font-size:11.5px; color:var(--danger); margin-top:5px; display:none;}
.form-group.invalid .form-input{border-color:var(--danger); box-shadow:0 0 0 4px rgba(255,77,109,0.08);}
.form-group.invalid .form-error{display:block;}

.auth-shell{display:flex; min-height:100vh; align-items:center; justify-content:center; padding:30px;}
.auth-card{width:100%; max-width:400px; padding:38px 34px;}
.auth-tabs{display:flex; gap:6px; margin-bottom:26px; background:rgba(120,170,255,0.05); padding:4px; border-radius:12px;}
.auth-tab{flex:1; text-align:center; padding:9px; border-radius:9px; font-size:13px; font-weight:600; color:var(--muted); background:transparent; border:none;}
.auth-tab.active{background:linear-gradient(135deg, var(--neon), var(--violet)); color:#04101c;}
.checkbox-row{display:flex; align-items:center; gap:9px; font-size:12.5px; color:var(--muted); margin-bottom:18px;}
.checkbox-row input{accent-color:var(--neon);}

/* ---------- MODALS / TOASTS / CONTEXT MENU ---------- */
.overlay{position:fixed; inset:0; background:rgba(4,10,20,0.6); backdrop-filter:blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s ease;}
.overlay.show{opacity:1; pointer-events:auto;}
.modal{
  width:100%; max-width:440px; padding:28px; margin:20px;
  background:var(--glass-strong); border:1px solid var(--glass-border); border-radius:var(--radius-lg);
  box-shadow:0 30px 80px -20px rgba(0,0,0,0.6); transform:translateY(14px) scale(0.98); transition:transform 0.25s cubic-bezier(.2,.8,.2,1);
}
.overlay.show .modal{transform:translateY(0) scale(1);}
.modal-title{font-family:var(--font-display); font-size:18px; font-weight:700; margin-bottom:10px;}
.modal-text{font-size:13.5px; color:var(--muted); line-height:1.6; margin-bottom:22px;}
.modal-actions{display:flex; justify-content:flex-end; gap:10px;}

.toast-stack{position:fixed; bottom:24px; right:24px; z-index:200; display:flex; flex-direction:column; gap:10px; align-items:flex-end;}
.toast{
  display:flex; align-items:center; gap:11px; padding:13px 16px; border-radius:13px; min-width:260px; max-width:340px;
  background:var(--glass-strong); border:1px solid var(--glass-border); box-shadow:0 20px 50px -18px rgba(0,0,0,0.5);
  animation:toastIn 0.3s cubic-bezier(.2,.8,.2,1); font-size:13px;
}
@keyframes toastIn{from{opacity:0; transform:translateX(30px);} to{opacity:1; transform:translateX(0);}}
.toast-icon{width:26px; height:26px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px;}
.toast.success .toast-icon{background:rgba(52,228,176,0.15); color:var(--success);}
.toast.error .toast-icon{background:rgba(255,77,109,0.15); color:var(--danger);}
.toast.info .toast-icon{background:rgba(0,212,255,0.15); color:var(--neon);}
.toast-msg{flex:1;}
.toast-close{color:var(--muted-dim); background:none; border:none; font-size:15px;}

.ctx-menu{
  position:fixed; z-index:150; min-width:180px; padding:6px; border-radius:12px;
  background:var(--glass-strong); border:1px solid var(--glass-border); box-shadow:0 20px 50px -15px rgba(0,0,0,0.55);
  opacity:0; transform:scale(0.96); pointer-events:none; transition:all 0.14s ease; transform-origin:top left;
}
.ctx-menu.show{opacity:1; transform:scale(1); pointer-events:auto;}
.ctx-item{display:flex; align-items:center; gap:9px; padding:9px 11px; border-radius:8px; font-size:12.5px; color:var(--text); background:none; border:none; width:100%; text-align:left;}
.ctx-item:hover{background:rgba(120,170,255,0.1);}
.ctx-item.danger{color:var(--danger);}
.ctx-divider{height:1px; background:var(--glass-border); margin:4px 6px;}

/* ---------- NOTIFICATIONS ---------- */
.notif-item{display:flex; gap:14px; padding:16px 18px; margin-bottom:8px; position:relative;}
.notif-item.unread::before{content:''; position:absolute; left:8px; top:22px; width:6px; height:6px; border-radius:50%; background:var(--neon); box-shadow:0 0 6px var(--neon);}
.notif-item{padding-left:26px;}
.notif-text{font-size:13.5px; line-height:1.5;}
.notif-text b{font-weight:600;}
.notif-time{font-size:11.5px; color:var(--muted-dim); margin-top:4px; font-family:var(--font-mono);}

/* ---------- SETTINGS ---------- */
.settings-layout{display:grid; grid-template-columns:200px 1fr; gap:22px;}
.settings-tabs{display:flex; flex-direction:column; gap:2px;}
.settings-tab{padding:11px 14px; border-radius:10px; font-size:13px; color:var(--muted); background:none; border:none; text-align:left;}
.settings-tab:hover{background:rgba(120,170,255,0.06); color:var(--text);}
.settings-tab.active{background:linear-gradient(90deg, rgba(0,212,255,0.14), rgba(108,92,231,0.08)); color:var(--text); font-weight:600;}
.settings-panel{padding:26px;}
.settings-section-title{font-family:var(--font-display); font-weight:600; font-size:16px; margin-bottom:4px;}
.settings-section-sub{font-size:12.5px; color:var(--muted); margin-bottom:20px;}
.toggle-row{display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--glass-border);}
.toggle-row:last-child{border-bottom:none;}
.toggle-label{font-size:13.5px; font-weight:500;}
.toggle-desc{font-size:12px; color:var(--muted-dim); margin-top:2px;}
.switch{width:42px; height:24px; border-radius:20px; background:rgba(120,170,255,0.15); position:relative; flex-shrink:0; border:1px solid var(--glass-border); transition:all 0.2s ease;}
.switch::after{content:''; position:absolute; width:18px; height:18px; border-radius:50%; background:var(--muted); top:2px; left:2px; transition:all 0.2s ease;}
.switch.on{background:linear-gradient(135deg, var(--neon), var(--violet)); border-color:transparent;}
.switch.on::after{left:20px; background:#04101c;}
.theme-switch-row{display:flex; align-items:center; gap:10px;}
.theme-opt{display:flex; align-items:center; gap:8px; padding:10px 14px; border-radius:11px; background:rgba(120,170,255,0.05); border:1px solid var(--glass-border); font-size:13px; color:var(--muted);}
.theme-opt.active{border-color:var(--neon-soft); color:var(--text); background:rgba(0,212,255,0.08);}

/* ---------- PROFILE ---------- */
.profile-hero{padding:32px; display:flex; gap:24px; align-items:center; flex-wrap:wrap; margin-bottom:22px;}
.profile-name-line{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
.profile-name{font-family:var(--font-display); font-size:22px; font-weight:700;}
.profile-handle{color:var(--muted-dim); font-family:var(--font-mono); font-size:13px; margin-top:2px;}
.profile-bio{color:var(--muted); font-size:13.5px; margin-top:10px; max-width:480px; line-height:1.55;}
.profile-stats{display:flex; gap:26px; margin-top:14px;}
.profile-stats div{text-align:left;}
.profile-stats span{display:block; font-family:var(--font-display); font-weight:700; font-size:17px;}
.profile-stats small{font-size:11px; color:var(--muted-dim);}
.profile-actions{margin-left:auto; display:flex; gap:10px; align-self:flex-start;}
.profile-tabs{display:flex; gap:4px; margin-bottom:16px; border-bottom:1px solid var(--glass-border);}
.profile-tab{padding:11px 16px; font-size:13px; color:var(--muted); background:none; border:none; border-bottom:2px solid transparent; margin-bottom:-1px;}
.profile-tab.active{color:var(--text); border-color:var(--neon); font-weight:600;}

/* ---------- ADMIN ---------- */
.admin-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px;}
.table-wrap{overflow-x:auto;}
table{width:100%; border-collapse:collapse; font-size:13px;}
th{text-align:left; padding:12px 16px; color:var(--muted-dim); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--glass-border);}
td{padding:13px 16px; border-bottom:1px solid var(--glass-border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(120,170,255,0.03);}
.status-dot{display:inline-flex; align-items:center; gap:6px; font-size:12px;}
.status-dot::before{content:''; width:7px; height:7px; border-radius:50%;}
.status-dot.online::before{background:var(--success); box-shadow:0 0 6px var(--success);}
.status-dot.offline::before{background:var(--muted-dim);}
.status-dot.banned::before{background:var(--danger);}

.footer{
  border-top:1px solid var(--glass-border); padding:26px 30px; margin-top:20px;
  display:flex; flex-wrap:wrap; gap:20px 34px; align-items:center; justify-content:space-between;
  color:var(--muted-dim); font-size:12.5px;
}
.footer-links{display:flex; gap:22px; flex-wrap:wrap;}
.footer-links a:hover{color:var(--neon);}

.view{animation:viewIn 0.35s cubic-bezier(.2,.8,.2,1);}
@keyframes viewIn{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}
.hidden{display:none !important;}

@media (max-width:1000px){
  .app{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .cat-grid{grid-template-columns:1fr;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .settings-layout{grid-template-columns:1fr;}
  .admin-grid{grid-template-columns:1fr;}
  .content{padding:20px 16px 50px;}
  .topbar{padding:14px 16px;}
}
@media (max-width:640px){
  .topic-stats{display:none;}
  .profile-hero{flex-direction:column; align-items:flex-start;}
  .profile-actions{margin-left:0;}
}
</style>
</head>
<body>

<div class="app" id="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="content" id="content"></main>
    <footer class="footer" id="footer"></footer>
  </div>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modalBox"></div></div>
<div class="toast-stack" id="toastStack"></div>
<div class="ctx-menu" id="ctxMenu"></div>

<script src="app.js"></script>
</body>
</html>
